<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>기드온 실시간 감시</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f0f2f7; --surface: #fff; --surface2: #e8ebf4;
  --border: #ced4e8; --text: #12162a; --text2: #4a5070; --text3: #8890b0;
  --red: #d41e1e; --red-dim: rgba(212,30,30,0.08);
  --blue: #1450b8; --blue-dim: rgba(20,80,184,0.08);
  --green: #0f7a3c; --green-dim: rgba(15,122,60,0.08);
  --orange: #c05800; --orange-dim: rgba(192,88,0,0.08);
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Noto Sans KR', sans-serif;
}
body { font-family: var(--sans); background: var(--bg); color: var(--text); padding: 16px 12px 60px; font-size: 14px; }

.hdr { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; gap:10px; }
.hdr h1 { font-size:18px; font-weight:700; border-left:4px solid var(--red); padding-left:10px; line-height:1.3; }
.hdr h1 span { font-size:12px; font-weight:400; color:var(--text2); display:block; margin-top:2px; }
.conn { display:flex; flex-direction:column; align-items:flex-end; gap:3px; }
.conn-dot { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--text3); }
.dot { width:7px; height:7px; border-radius:50%; background:var(--text3); }
.dot.on  { background:var(--green); animation:glow 2s ease infinite; }
.dot.err { background:var(--red); }
@keyframes glow { 0%,100%{opacity:1} 50%{opacity:.3} }
.last-t { font-size:11px; color:var(--text3); }
.mkt-st { font-size:11px; font-weight:600; }

.add-bar { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:12px; display:flex; gap:8px; flex-wrap:wrap; align-items:flex-end; }
.field { display:flex; flex-direction:column; gap:4px; flex:1; min-width:90px; }
.field label { font-size:11px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:.05em; }
.field input { background:var(--surface2); border:1px solid var(--border); border-radius:7px; color:var(--text); font-family:var(--mono); font-size:14px; padding:8px 9px; touch-action:manipulation; }
.field input:focus { outline:none; border-color:var(--blue); background:#fff; }
.search-wrap { position:relative; flex:2; min-width:140px; display:flex; flex-direction:column; gap:4px; }
.search-wrap label { font-size:11px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:.05em; }
.search-wrap input { background:var(--surface2); border:1px solid var(--border); border-radius:7px; color:var(--text); font-family:var(--mono); font-size:14px; padding:8px 9px; touch-action:manipulation; }
.search-wrap input:focus { outline:none; border-color:var(--blue); background:#fff; }
.dd { display:none; position:absolute; top:100%; left:0; right:0; background:#fff; border:1px solid var(--border); border-radius:8px; z-index:100; max-height:220px; overflow-y:auto; box-shadow:0 4px 16px rgba(0,0,0,.10); }
.dd-item { padding:9px 12px; cursor:pointer; font-size:13px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--surface2); }
.dd-item:hover { background:var(--surface2); }
.dd-item .code { font-size:11px; color:var(--text3); font-family:var(--mono); }
.btn-add { padding:8px 16px; font-size:14px; font-family:var(--sans); font-weight:700; border-radius:7px; border:none; background:var(--red); color:#fff; cursor:pointer; touch-action:manipulation; -webkit-tap-highlight-color:transparent; align-self:flex-end; }
.btn-add:active { opacity:.75; }

.ctrl-row { display:flex; gap:7px; flex-wrap:wrap; align-items:center; margin-bottom:10px; }
.ftag { font-size:12px; padding:5px 11px; border-radius:99px; border:1px solid var(--border); background:var(--surface); color:var(--text2); font-family:var(--sans); font-weight:500; cursor:pointer; touch-action:manipulation; -webkit-tap-highlight-color:transparent; }
.ftag:active { opacity:.7; }
.ftag.on { background:var(--red-dim); border-color:var(--red); color:var(--red); font-weight:700; }
.cnt-info { margin-left:auto; font-size:12px; color:var(--text3); }

.tbl-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; background:var(--surface); border-radius:10px; overflow:hidden; border:1px solid var(--border); }
thead th { padding:9px 10px; font-size:12px; font-weight:700; color:var(--text2); background:var(--surface2); border-bottom:1px solid var(--border); text-align:right; white-space:nowrap; cursor:pointer; user-select:none; touch-action:manipulation; }
thead th:first-child { text-align:left; }
thead th:hover { color:var(--text); }
thead th.sorted { color:var(--red); }
thead th .arr { font-size:10px; margin-left:3px; }

tbody tr { border-bottom:1px solid var(--surface2); transition:background .15s; }
tbody tr:last-child { border-bottom:none; }
tbody tr:hover { background:var(--surface2); }
tbody tr.st-reached { background:var(--green-dim); }
tbody tr.st-done    { background:var(--green-dim); opacity:.75; }

.grp-row td { padding:7px 10px; font-size:12px; font-weight:700; background:var(--surface2); border-bottom:1px solid var(--border); border-top:2px solid var(--border); }
.grp-row.g-reached td { border-top-color:var(--green); color:var(--green); }
.grp-row.g-wait td   { border-top-color:var(--border);  color:var(--text2); }
.grp-row.g-done td     { border-top-color:var(--green);   color:var(--green); }
.grp-row.g-near td     { border-top-color:#e53e3e; color:#e53e3e; background:#fff5f5; }
.grp-row.g-waitRest td { border-top-color:var(--border); color:var(--text2); }
.grp-row.g-far td      { border-top-color:#9097b8; color:#9097b8; }

td { padding:9px 10px; font-size:13px; text-align:right; white-space:nowrap; }
td:first-child { text-align:left; }
td.mono { font-family:var(--mono); }

.name-cell { display:flex; flex-direction:column; gap:2px; }
.sname { font-size:14px; font-weight:700; }
.scode { font-size:11px; color:var(--text3); font-family:var(--mono); }
.stbadge { display:inline-block; font-size:10px; font-weight:700; padding:1px 7px; border-radius:99px; border:1px solid; white-space:nowrap; }
.stbadge.wait    { border-color:var(--border); color:var(--text3); background:var(--surface2); }
.stbadge.reached { border-color:var(--green); color:var(--green); background:var(--green-dim); }
.stbadge.done    { border-color:var(--green);  color:var(--green);  background:var(--green-dim); }
@keyframes flash { 0%,100%{opacity:1} 50%{opacity:.4} }

.up { color:var(--red); } .dn { color:var(--blue); } .warn { color:var(--orange); font-weight:700; } .muted { color:var(--text3); }

.row-btns { display:flex; gap:4px; justify-content:flex-end; }
.rbtn { font-size:11px; padding:3px 8px; border-radius:5px; border:1px solid var(--border); background:var(--surface2); color:var(--text3); cursor:pointer; touch-action:manipulation; -webkit-tap-highlight-color:transparent; font-family:var(--sans); }
.rbtn:active { opacity:.6; }
.rbtn.done-btn  { border-color:var(--green); color:var(--green); }
.rbtn.del-btn   { border-color:var(--red);   color:var(--red); }

.empty { text-align:center; padding:40px; color:var(--text3); font-size:13px; }

.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(8px); background:#12162a; color:#fff; font-size:13px; padding:9px 18px; border-radius:99px; z-index:999; opacity:0; transition:opacity .25s,transform .25s; pointer-events:none; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>

<div class="hdr">

<script>
const STORE  = 'gideon_tbl_v1';
const PROXY  = 'https://gideon-hirh-rrpw.onrender.com';
const WS_URL = 'wss://gideon-hirh-rrpw.onrender.com/ws';
const PROFIT = 1.3;
const REST_IV = 15000;

let stocks = [], token = null, wsKey = null, bws = null;
let filter = 'all', sortCol = 'pctToBuy', sortDir = 1;
let restTimer = null, selCode = '', selName = '';

async function load() {
  try {
    const r = await fetch(PROXY+'/stocks');
    const data = await r.json();
    stocks = data.map(s => ({
      id: s.id, code: s.code, name: s.name || s.code,
      buyPrice: parseFloat(s.buy_price), baseDate: s.base_date ? s.base_date.slice(0,10) : '',
      status: s.status,
      curPrice: s.cur_price ? parseFloat(s.cur_price) : null,
      changeRate: s.change_rate ? parseFloat(s.change_rate) : null,
      volume: s.volume || null, strength: s.strength ? parseFloat(s.strength) : null,
      tradingAmt: s.trading_amt || null, marketClosed: s.market_closed || false,
      loading: !s.cur_price && !s.change_rate
    }));
    render();
  } catch(e) { console.error('종목 로드 실패', e); }
}
function persist() {} // 서버에서 관리
function todayStr() { return new Date().toISOString().slice(0,10); }
function byId(id) { return stocks.find(s => s.id === id); }

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('inp-base').value = todayStr();
  load(); // 서버에서 종목 로드
  // 소리 활성화 (첫 클릭 시)
  document.addEventListener('click', () => {
    try { new (window.AudioContext||window.webkitAudioContext)(); } catch {}
  }, { once: true });

  document.getElementById('btn-add').addEventListener('click', doAdd);
  document.getElementById('inp-search').addEventListener('input', onSrchInput);
  document.getElementById('inp-search').addEventListener('blur', () => setTimeout(() => { document.getElementById('dd').style.display = 'none'; }, 200));
  document.querySelectorAll('.ftag').forEach(b => b.addEventListener('click', () => setFilter(b.dataset.f)));
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = 1; }
      render();
    });
  });
  document.getElementById('tbody').addEventListener('click', e => {
    const done  = e.target.closest('.done-btn');
    const reset = e.target.closest('.reset-btn');
    const del   = e.target.closest('.del-btn');
    if (done)  doManualDone(+done.dataset.id);
    if (reset) doReset(+reset.dataset.id);
    if (del)   doRemove(+del.dataset.id);
  });

  if (APP_KEY === 'YOUR_APP_KEY') { setConn('err','앱키 미설정'); return; }
  getToken();
  // 30초마다 서버 상태 동기화
  setInterval(load, 30000);
});

let srchTimer = null;
function onSrchInput() {
  clearTimeout(srchTimer);
  const v = document.getElementById('inp-search').value.trim();
  if (!v) { document.getElementById('dd').style.display='none'; return; }
  if (/^\d{6}$/.test(v)) { selCode=v; selName=v; document.getElementById('dd').style.display='none'; return; }
  srchTimer = setTimeout(() => doSearch(v), 350);
}

async function doSearch(kw) {
  if (!token) { toast('연결 후 검색 가능해요.'); return; }
  const dd = document.getElementById('dd');
  dd.innerHTML = '<div style="padding:10px;color:#8890b0;font-size:13px;">검색 중...</div>';
  dd.style.display = 'block';
  try {
    const r = await fetch(PROXY+'/search?keyword='+encodeURIComponent(kw)+'&token='+token+'&appkey='+APP_KEY+'&appsecret='+encodeURIComponent(APP_SECRET));
    const items = await r.json();
    if (!items.length) { dd.innerHTML='<div style="padding:10px;color:#8890b0;font-size:13px;">검색 결과 없음</div>'; return; }
    dd.innerHTML = items.map(it=>'<div class="dd-item" data-code="'+it.code+'" data-name="'+it.name+'"><span>'+it.name+'</span><span class="code">'+it.code+'</span></div>').join('');
    dd.querySelectorAll('.dd-item').forEach(el => {
      el.addEventListener('mousedown', () => {
        selCode=el.dataset.code; selName=el.dataset.name;
        document.getElementById('inp-search').value=selName+' ('+selCode+')';
        dd.style.display='none';
      });
    });
  } catch { dd.innerHTML='<div style="padding:10px;color:#8890b0;font-size:13px;">검색 실패</div>'; }
}

async function getToken() {
  setConn('','토큰 발급 중...');
  try {
    const r1 = await fetch(PROXY+'/token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({appkey:APP_KEY,appsecret:APP_SECRET})});
    const d1 = await r1.json();
    if (!d1.access_token) { setConn('err','토큰 오류'); return; }
    token = d1.access_token;
    const r2 = await fetch(PROXY+'/wskey',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({appkey:APP_KEY,appsecret:APP_SECRET})});
    const d2 = await r2.json();
    wsKey = d2.approval_key;
    wsKey ? connectWS() : startRest();
  } catch { setConn('err','네트워크 오류'); startRest(); }
}

function connectWS() {
  setConn('','WebSocket 연결 중...');
  bws = new WebSocket(WS_URL);
  bws.onopen = () => {
    setConn('on','실시간 연결됨');
    bws.send(JSON.stringify({action:'connect',approval_key:wsKey}));
    stocks.forEach(s => bws.send(JSON.stringify({action:'subscribe',code:s.code})));
    fetchAllRest();
  };
  bws.onmessage = e => handleWS(e.data);
  bws.onerror   = () => { setConn('err','REST 모드'); startRest(); };
  bws.onclose   = () => { if (token) setTimeout(connectWS,4000); };
}

function handleWS(raw) {
  if (raw[0]==='{') return;
  const parts = raw.split('|');
  if (parts.length < 4) return;
  const f = parts[3].split('^');
  const s = stocks.find(s => s.code===f[0]);
  if (!s) return;
  s.curPrice   = +f[2];
  s.changeRate = +f[5];   // 등락률 %
  s.volume     = +f[13];  // 누적체결량
  s.strength   = +f[18];  // 체결강도
  s.tradingAmt = +f[14];  // 거래대금
  s.loading    = false; s.marketClosed = false;
  checkStatus(s); persist();
  document.getElementById('last-t').textContent = new Date().toLocaleTimeString('ko-KR');
  updateMktSt(); render();
}

function startRest() { if (!restTimer) { fetchAllRest(); restTimer=setInterval(fetchAllRest,REST_IV); } }

async function fetchAllRest() {
  if (!token) return;
  for (const s of stocks) {
    try {
      const r = await fetch(PROXY+'/price?code='+s.code+'&token='+token+'&appkey='+APP_KEY+'&appsecret='+encodeURIComponent(APP_SECRET));
      const d = await r.json();
      if (d.market_status==='closed') {
        const o = d.output&&d.output[0];
        if (o) { s.curPrice=+o.stck_clpr; s.changeRate=+o.prdy_ctrt; s.volume=null; s.strength=null; s.tradingAmt=+o.acml_tr_pbmn; s.loading=false; s.marketClosed=true; checkStatus(s); persist(); }
      } else if (d.rt_cd==='0') {
        const o=d.output;
        s.name=o.hts_kor_isnm||s.code; s.curPrice=+o.stck_prpr; s.changeRate=+o.prdy_ctrt;
        s.volume=+o.cntg_vol; s.strength=+o.chgvol; s.tradingAmt=+o.acml_tr_pbmn;
        s.loading=false; s.marketClosed=false; checkStatus(s); persist();
      }
    } catch {}
  }
  document.getElementById('last-t').textContent=new Date().toLocaleTimeString('ko-KR');
  updateMktSt(); render();
}

async function fetchNameRest(s) {
  if (!token) return;
  try {
    const r=await fetch(PROXY+'/price?code='+s.code+'&token='+token+'&appkey='+APP_KEY+'&appsecret='+encodeURIComponent(APP_SECRET));
    const d=await r.json();
    if (d.rt_cd==='0') {
      // 이름은 이미 검색으로 받은 게 있으면 유지
      if (!s.name || s.name === s.code) s.name=d.output.hts_kor_isnm||s.code;
      s.curPrice=+d.output.stck_prpr; s.changeRate=+d.output.prdy_ctrt; s.tradingAmt=+d.output.acml_tr_pbmn; s.loading=false; persist(); render();
    } else if (d.market_status==='closed'&&d.output&&d.output[0]) {
      if (!s.name || s.name === s.code) s.name=d.output[0].hts_kor_isnm||s.code;
      s.curPrice=+d.output[0].stck_clpr; s.changeRate=+d.output[0].prdy_ctrt; s.tradingAmt=+d.output[0].acml_tr_pbmn; s.loading=false; s.marketClosed=true; persist(); render();
    }
  } catch {}
}

// ── 소리 알림 ──
function playAlert(code) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [880, 1100, 880].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.12);
      osc.start(ctx.currentTime + i * 0.15);
      osc.stop(ctx.currentTime + i * 0.15 + 0.12);
    });
  } catch {}
}

function checkStatus(s) {
  if (!s.curPrice) return;
  if (s.status==='done') return; // 익절 완료는 영구

  const today=todayStr();
  const profitPrice=s.buyPrice*(1+PROFIT/100);

  // 기준날짜 이전이면 감시 안 함
  if (s.baseDate&&today<s.baseDate) { s.status='wait'; return; }

  // 익절 완료 체크 (매수 도달 상태에서 +1.3% 찍으면 영구 완료)
  if (s.status==='reached'&&s.curPrice>=profitPrice) { s.status='done'; return; }

  // 실시간 도달 상태
  const wasReached = s.status==='reached';
  const isReached  = s.curPrice<=s.buyPrice;
  s.status = isReached ? 'reached' : 'wait';

  // 새로 도달했을 때 소리 알림 + 서버 상태 업데이트
  if (!wasReached && isReached) {
    playAlert(s.code);
    fetch(PROXY+'/stocks/'+s.code, {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:'reached'})}).catch(()=>{});
  }
  if (wasReached && !isReached) {
    fetch(PROXY+'/stocks/'+s.code, {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:'wait'})}).catch(()=>{});
  }
}

async function doAdd() {
  const sv=document.getElementById('inp-search').value.trim();
  const bp=+document.getElementById('inp-buy').value;
  const bd=document.getElementById('inp-base').value;
  if (/^\d{6}$/.test(sv)) { selCode=sv; selName=sv; }
  if (!selCode) { toast('종목을 검색하거나 코드 6자리를 입력해주세요.'); return; }
  if (!bp) { toast('매수가를 입력해주세요.'); return; }
  if (stocks.find(s=>s.code===selCode)) { toast('이미 추가된 종목이에요.'); return; }
  try {
    const r = await fetch(PROXY+'/stocks', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({code:selCode, name:selName||selCode, buyPrice:bp, baseDate:bd||null})});
    const s = await r.json();
    stocks.unshift({id:s.id, code:s.code, name:s.name||s.code, buyPrice:parseFloat(s.buy_price),
      baseDate:s.base_date?s.base_date.slice(0,10):'', status:'wait',
      curPrice:null, changeRate:null, volume:null, strength:null, tradingAmt:null, loading:true, marketClosed:false});
    render();
    document.getElementById('inp-search').value='';
    document.getElementById('inp-buy').value='';
    selCode=''; selName='';
    if (bws&&bws.readyState===1) bws.send(JSON.stringify({action:'subscribe',code:s.code}));
  } catch(e) { toast('추가 실패: '+e.message); }
}

async function doManualDone(id) {
  const s=byId(id); if(!s)return;
  try {
    await fetch(PROXY+'/stocks/'+s.code, {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:'done'})});
    s.status='done'; render(); toast(s.name+' 익절 완료!');
  } catch(e) { toast('오류 발생'); }
}
async function doReset(id) {
  const s=byId(id); if(!s)return;
  try {
    await fetch(PROXY+'/stocks/'+s.code, {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:'wait'})});
    s.status='wait'; render(); toast(s.name+' 초기화됐어요.');
  } catch(e) { toast('오류 발생'); }
}
async function doRemove(id) {
  if(!confirm('삭제할까요?'))return;
  const s=byId(id); if(!s)return;
  try {
    await fetch(PROXY+'/stocks/'+s.code, {method:'DELETE'});
    stocks=stocks.filter(s=>s.id!==id); render();
  } catch(e) { toast('삭제 실패'); }
}

function setFilter(f) {
  filter=f;
  ['all','wait','reached','done'].forEach(x=>document.getElementById('f-'+x).classList.toggle('on',x===f));
  render();
}

function getSortVal(s,col) {
  switch(col) {
    case 'curPrice':   return s.curPrice||0;
    case 'changeRate': return s.changeRate||0;
    case 'pctToBuy':   return s.curPrice?(s.curPrice-s.buyPrice)/s.buyPrice*100:999;
    case 'buyPrice':   return s.buyPrice||0;
    case 'strength':   return s.strength||0;
    case 'volume':     return s.volume||0;
    case 'tradingAmt': return s.tradingAmt||0;
    case 'name':       return s.name||'';
    case 'baseDate':   return s.baseDate||'';
    default: return 0;
  }
}

function getPct(s) {
  return s.curPrice ? (s.buyPrice - s.curPrice) / s.curPrice * 100 : null;
}

function grouped() {
  let arr=[...stocks];
  if (filter!=='all') arr=arr.filter(s=>s.status===filter);
  function srt(list) {
    return list.sort((a,b)=>{
      const va=getSortVal(a,sortCol),vb=getSortVal(b,sortCol);
      if (typeof va==='string') return va.localeCompare(vb)*sortDir;
      return (va-vb)*sortDir;
    });
  }
  // 상태별 + 근접도별 그룹
  const reached = arr.filter(s=>s.status==='reached');
  const wait    = arr.filter(s=>s.status==='wait');
  const done    = arr.filter(s=>s.status==='done');
  // 대기중에서 -3% 이내 (매수가 거의 도달)
  const near    = wait.filter(s=>{ const p=getPct(s); return p!==null && p>=-3 && p<0; });
  const nearCodes = new Set(near.map(s=>s.code));
  // 대기중에서 -20% 이상 (많이 떨어진 것, 즉 현재가가 매수가보다 20%이상 높음)
  const far     = wait.filter(s=>{ const p=getPct(s); return p!==null && p<=-20; });
  const farCodes = new Set(far.map(s=>s.code));
  // 나머지 대기중
  const waitRest = wait.filter(s=>!nearCodes.has(s.code)&&!farCodes.has(s.code));

  return {
    reached: srt(reached),
    near:    srt(near),
    waitRest:srt(waitRest),
    far:     srt(far),
    done:    srt(done),
    total:   arr.length
  };
}

function render() {
  const {reached,near,waitRest,far,done,total}=grouped();
  const ci=document.getElementById('cnt-info'); if(ci) ci.textContent=total+'개';

  document.querySelectorAll('thead th[data-col]').forEach(th=>{
    const col=th.dataset.col;
    th.classList.toggle('sorted',col===sortCol);
    const arr=th.querySelector('.arr');
    if(arr) arr.textContent=col===sortCol?(sortDir===1?'↑':'↓'):'↕';
  });

  const tbody=document.getElementById('tbody');
  if (!total) { tbody.innerHTML='<tr><td colspan="10" class="empty">'+(stocks.length?'해당 조건의 종목 없음':'종목을 추가해주세요')+'</td></tr>'; return; }

  const secs=filter==='all'
    ?[
      {key:'reached', label:'✅ 매수 가능',          items:reached},
      {key:'near',    label:'🔥 매수가 -3% 이내',    items:near},
      {key:'waitRest',label:'대기중',                 items:waitRest},
      {key:'far',     label:'❄️ -20% 이상 (멀리)',   items:far},
      {key:'done',    label:'✓ 익절 완료',            items:done},
    ]
    :[{key:filter,label:filter==='reached'?'매수 도달':filter==='wait'?'대기중':'익절 완료',
       items:filter==='reached'?reached:filter==='wait'?[...near,...waitRest,...far]:done}];

  let html='';
  secs.forEach(sec=>{
    if (!sec.items.length) return;
    html+='<tr class="grp-row g-'+sec.key+'"><td colspan="10">'+sec.label+' ('+sec.items.length+')</td></tr>';
    sec.items.forEach(s=>{ html+=renderRow(s); });
  });
  tbody.innerHTML=html;
}

function renderRow(s) {
  const pct=getPct(s);
  const pctStr=pct!==null?(pct>=0?'+':'')+pct.toFixed(2)+'%':'—';
  const pctCls=pct===null?'muted':s.status==='reached'?'warn':pct<0?'dn':'up';
  const crStr=s.changeRate!==null?(s.changeRate>=0?'+':'')+s.changeRate.toFixed(2)+'%':'—';
  const crCls=s.changeRate>0?'up':s.changeRate<0?'dn':'';
  const prStr=s.curPrice?s.curPrice.toLocaleString():(s.loading?'로딩..':'—');
  const prCls=s.changeRate>0?'up':s.changeRate<0?'dn':'';
  const stL={wait:'대기중',reached:'✅매수가능',done:'✓익절완료'};
  return '<tr class="st-'+s.status+'">'+
    '<td><div class="name-cell"><span class="sname">'+s.name+'</span><span class="scode">'+s.code+'</span><span class="stbadge '+s.status+'">'+stL[s.status]+'</span></div></td>'+
    '<td class="mono '+prCls+'">'+prStr+'</td>'+
    '<td class="mono '+crCls+'">'+crStr+'</td>'+
    '<td class="mono '+pctCls+'">'+pctStr+'</td>'+
    '<td class="mono">'+s.buyPrice.toLocaleString()+'</td>'+
    '<td class="mono">'+(s.strength!==null?s.strength.toFixed(1):'—')+'</td>'+
    '<td class="mono">'+(s.volume!==null?s.volume.toLocaleString():'—')+'</td>'+
    '<td class="mono">'+(s.tradingAmt?fmtAmt(s.tradingAmt):'—')+'</td>'+
    '<td class="muted" style="font-size:11px">'+(s.baseDate?String(s.baseDate).slice(0,10).replace(/-/g,'.'):'—')+'</td>'+
    '<td><div class="row-btns">'+
    (s.status!=='done'?'<button class="rbtn done-btn" data-id="'+s.id+'">완료</button>':'')+
    '<button class="rbtn reset-btn" data-id="'+s.id+'">초기화</button>'+
    '<button class="rbtn del-btn" data-id="'+s.id+'">삭제</button>'+
    '</div></td></tr>';
}

function fmtAmt(n) {
  if(n>=1e12) return (n/1e12).toFixed(1)+'조';
  if(n>=1e8)  return Math.round(n/1e8)+'억';
  if(n>=1e4)  return Math.round(n/1e4)+'만';
  return n.toLocaleString();
}
function setConn(type,txt) {
  document.getElementById('dot').className='dot'+(type?' '+type:'');
  document.getElementById('conn-txt').textContent=txt;
}
function updateMktSt() {
  const el=document.getElementById('mkt-st'); if(!el)return;
  const any=stocks.find(s=>s.curPrice&&s.marketClosed!==undefined);
  if(!any)return;
  el.textContent=any.marketClosed?'🔴 장 마감':'🟢 장 중';
  el.style.color=any.marketClosed?'var(--red)':'var(--green)';
}
function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
</script>
